name: Deploy Mininio Pages

on:
  repository_dispatch:
    types: [deploy-mininio-pages]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pages repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: CoGian/mininio_carb_tracker
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: _private

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python3 pages/build.py --repo-path _private --output-dir mininio

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mininio/
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy Mininio pages [skip ci]"
            git push origin main
          fi
