<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0F172A" />

  <!-- Shell -->
  <rect x="30" y="38" width="44" height="44" rx="10" fill="#2ecc71" />

  <!-- Head -->
  <ellipse cx="42" cy="38" rx="12" ry="14" fill="#2ecc71" />
  <ellipse cx="58" cy="38" rx="12" ry="14" fill="#2ecc71" />

  <!-- Shell center (terminal screen hint) -->
  <rect x="37" y="45" width="30" height="30" rx="6" fill="#0d1117" />

  <!-- Terminal prompt -->
  <text x="48" y="62" font-family="monospace" font-size="12" font-weight="bold" fill="#00ff00" text-anchor="middle">&gt;_</text>
</svg>
